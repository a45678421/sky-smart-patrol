# Copy this file to config.yaml and fill in your own keys.
# Never commit config.yaml to GitHub.

detection:
  # Use "openai" for OpenAI/Azure OpenAI, or "gemini" for Google Gemini.
  provider: "openai"

openai:
  # Azure OpenAI example:
  api_key: "YOUR_OPENAI_OR_AZURE_OPENAI_API_KEY"
  base_url: "https://YOUR-RESOURCE.services.ai.azure.com/openai/v1"
  model: "YOUR_DEPLOYMENT_NAME"

gemini:
  api_key: "YOUR_GEMINI_API_KEY"
  model: "gemini-3.1-flash-lite"

line:
  channel_id: "YOUR_LINE_CHANNEL_ID"
  channel_secret: "YOUR_LINE_CHANNEL_SECRET"
  channel_access_token: "YOUR_LINE_CHANNEL_ACCESS_TOKEN"
  user_id: "YOUR_LINE_USER_ID_OR_GROUP_ID"
  # Optional: use this only if you expose the Flask server through public HTTPS.
  public_base_url: ""

cloudinary:
  # Required if you want LINE image messages without exposing the local server.
  cloud_name: "YOUR_CLOUDINARY_CLOUD_NAME"
  api_key: "YOUR_CLOUDINARY_API_KEY"
  api_secret: "YOUR_CLOUDINARY_API_SECRET"
  folder: "sky-smart-patrol"
